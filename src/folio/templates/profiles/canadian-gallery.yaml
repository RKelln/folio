# Profile: canadian-gallery
# For public and commercial art galleries in Canada
#
# Focuses on exhibition programming, curatorial practice, and public engagement.
# Omits studio/membership and festival-specific headings present in the
# artist-run-centre profile. Includes gallery-specific sections like
# Curatorial Vision, Collection Management, and Installation.

org:
  name: "My Gallery"
  abbreviation: "GAL"

funders:
  OAC: "Ontario Arts Council"
  TAC: "Toronto Arts Council"
  CCA: "Canada Council for the Arts"
  BCAH: "Canadian Heritage"

doc_types:
  - application
  - report
  - budget
  - notification
  - staff_board
  - support_material
  - agreement
  - planning
  - exhibition
  - press
  - catalogue

