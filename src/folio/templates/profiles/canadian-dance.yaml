# Profile: canadian-dance
# For dance companies and collectives in Canada (contemporary, ballet, etc.)
#
# Similar to the theatre profile but with dance-specific terminology:
# choreography, repertoire, company structure, and touring. Includes
# rehearsal/residency sections and dancer-specific working condition headings.
# Suitable for Toronto Dance Theatre, Ballet Creole, Kaeja d'Dance, etc.

org:
  name: "My Dance Company"
  abbreviation: "DANCE"

funders:
  OAC: "Ontario Arts Council"
  TAC: "Toronto Arts Council"
  CCA: "Canada Council for the Arts"
  BCAH: "Canadian Heritage"

