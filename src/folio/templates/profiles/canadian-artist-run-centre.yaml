# Profile: canadian-artist-run-centre
# For artist-run centres and media arts organizations in Canada
#
# Includes heading taxonomies for all four major Canadian arts funders
# (OAC, TAC, CCA, BCAH) derived from actual application form structures.
# Suitable for InterAccess, Vtape, Trinity Square Video, and similar orgs.

org:
  name: "My Artist-Run Centre"
  abbreviation: "ARC"

funders:
  OAC: "Ontario Arts Council"
  TAC: "Toronto Arts Council"
  CCA: "Canada Council for the Arts"
  BCAH: "Canadian Heritage"

doc_types:
  - application
  - report
  - budget
  - notification
  - activity_list
  - staff_board
  - support_material
  - agreement
  - planning
  - notes
  - exhibition
  - press

