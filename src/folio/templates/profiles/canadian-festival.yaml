# Profile: canadian-festival
# For festival organizations in Canada (film, music, arts, multi-disciplinary)
#
# Emphasizes BCAH (Canadian Heritage) and festival-specific application sections.
# Includes programming timelines, venue/location details, volunteer management,
# community engagement, and previous-edition reporting.
# Suitable for TIFF, Luminato, Pride, Fringe festivals, Nuit Blanche, etc.

org:
  name: "My Festival"
  abbreviation: "FEST"

funders:
  BCAH: "Canadian Heritage"
  OAC: "Ontario Arts Council"
  TAC: "Toronto Arts Council"
  CCA: "Canada Council for the Arts"

doc_types:
  - application
  - report
  - budget
  - notification
  - support_material
  - agreement
  - planning
  - schedule
  - programme
  - press
  - media_kit
  - venue

