# Profile: canadian-theatre
# For theatre companies in Canada
#
# Serves producing theatre companies, independent theatre collectives,
# and touring theatre organizations. Heading taxonomies include
# production history, touring/remounts, community outreach, script
# development, and seasonal programming cycles.
# Suitable for Soulpepper, Canadian Stage, Passe Muraille, Tarragon, etc.

org:
  name: "My Theatre Company"
  abbreviation: "THEATRE"

funders:
  OAC: "Ontario Arts Council"
  TAC: "Toronto Arts Council"
  CCA: "Canada Council for the Arts"
  BCAH: "Canadian Heritage"

