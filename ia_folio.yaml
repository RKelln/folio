# InterAccess (IA) folio project configuration
# Merged from prototype classify_config.yaml, rewrite_config.yaml,
# and prioritize_config.yaml in ../llm_wiki/
#
# Paths point at existing prototype directories so output can be
# compared byte-for-byte with prototype results.

project:
  name: "InterAccess Grant Archive"
  description: "Knowledge base from InterAccess's grant application archive"

org:
  name: "InterAccess"
  abbreviation: "IA"

# ── Funders (from prototype classify_config.yaml) ─────────────────────────
funders:
  "BCAH - Vector Festival": "Canadian Heritage (Vector Festival)"
  "BCAH": "Canadian Heritage"
  "OAC": "Ontario Arts Council"
  "TAC": "Toronto Arts Council"
  "CCA": "Canada Council for the Arts"

# ── Document types (from prototype classify_config.yaml) ──────────────────
doc_types:
  - application
  - report
  - notification
  - budget
  - activity_list
  - staff_board
  - support_material
  - guidelines
  - agreement
  - email
  - draft
  - meeting_notes
  - cv

# ── Paths (point at prototype directories) ────────────────────────────────
paths:
  raw_archive: "../llm_wiki/_raw_archive/"
  raw_md: "../llm_wiki/raw_md/"
  clean_md: "../llm_wiki/clean_md/"
  rewrite_md: "../llm_wiki/folio_rewrite_md/"
  wiki_project: "../llm_wiki/sage_wiki_3/"

# ── Converter ─────────────────────────────────────────────────────────────
converter:
  type: "datalab"
  datalab:
    pipeline_id: "pl_b-mZV9v283iM"
    api_key_env: "DATALAB_API_KEY"

# ── Wiki backend ──────────────────────────────────────────────────────────
wiki:
  type: "sage-wiki"
  sage_wiki:
    binary_path: "sage-wiki"
    pack: "arts-org"

# ── LLM provider ──────────────────────────────────────────────────────────
llm:
  provider: "openai_compatible"
  base_url: "https://api.deepseek.com"
  api_key_env: "DEEPSEEK_API_KEY"
  models:
    fast: "deepseek-v4-flash"
    quality: "deepseek-v4-pro"
  pricing:
    input_per_million: 0.14
    cached_input_per_million: 0.0028
    output_per_million: 0.28

# ── Processing ────────────────────────────────────────────────────────────
processing:
  max_workers: 10
  requests_per_second: 5
  max_retries: 3
  resume: true

# ── Classification config (from prototype classify_config.yaml) ───────────
classification:
  year_patterns:
    range: '\b(\d{4})\s*[-–]\s*(\d{4})\b'
    single: '\b(20[0-2]\d)\b'

  doc_types:
    application:
      - '\b(?:Application|submission|Submitted|FinalSubmission|Submission Confirmation)\b'
    report:
      - '\b(?:Report|report|Annual Update|Mid-Cycle|Final Report|Annual Report)\b'
    notification:
      - '\b(?:Notification|Approval|approval|result|Result|Acceptance|Notice|Payment Notice)\b'
    budget:
      - '\b(?:Budget|BudgetResults|Profit|Balance|P\+L|Financial|CADAC|cash flow|Cash Flow|Statement)\b'
    activity_list:
      - '\b(?:Activity List|ActivityLists|Activity Lists|Activities|Activity Report)\b'
    staff_board:
      - '\b(?:StaffList|BoardOfDirectors|Board\s*(?:List|Of|Staff)|Bios|IABios|BoardStaffList|Staff List|Board List)\b'
    support_material:
      - '\b(?:Support|Promotional|promo|press|Press|Media|Documentation|Support Materials?)\b'
    guidelines:
      - '\b(?:Guidelines|Instructions|FAQ|Webinar|Info Session)\b'
    agreement:
      - '\b(?:Declaration|LetterOfUnderstanding|Agreement|Compliance|Lease|Surplus|letter of agreement)\b'
    email:
      - '\b(?:Email|email|Announcement|Announcements)\b'
    draft:
      - '\b(?:draft|Draft|DRAFT|prep|Prep|PREP|todo|ToDo|TODO|Workback|Step.by.Step)\b'
    meeting_notes:
      - '\b(?:Notes|Meeting|Visioning|Minutes)\b'
    cv:
      - '\b(?:CV|Resume|resume)\b'

  form_chrome:
    - '(?i)To enter or edit text'
    - '(?i)go to your Organization Profile'
    - '(?i)FOR OFFICE USE ONLY'
    - '(?i)Protected\s+\w+\s+when\s+completed'
    - '(?i)Writing tip'
    - '(?i)Please (?:note|select|choose|enter|complete)'
    - '(?i)maximum \d+ words'
    - '(?i)Your planning process may simply be'
    - '(?i)Do not submit a copy of the plan'
    - '(?i)If there (?:have been|are) no changes'
    - '(?i)Describe the role it plays'

  draft_markers:
    - '^\s*(?:SK|MM|MN|CSP|SJD|GHM|BK|MYF|HM|ROB)(?:\s*(?:COMPLETE|DRAFT|edits?|toDo|TO\s*DO))?\s*$'
    - '(?i)SUGGESTED NEW OUTLINE'
    - '(?i)\bTO\s*DO\b'
    - '(?i)///Grant Questions'

  word_count_pattern: '\d+\s*words?'

  corruption:
    single_char_alpha: true
    bare_digits: true

  thresholds:
    min_content_lines: 15
    max_corruption_score: 0.5
    full_rewrite:
      form_chrome_count: 5
      draft_marker_count: 5
      duplicate_heading_count: 5
      word_count_annotation_count: 5
    full_rewrite_app_report:
      form_chrome_count: 2
      draft_marker_count: 2
    light_cleanup:
      form_chrome_count: 2
      draft_marker_count: 2
      duplicate_heading_count: 2
      word_count_annotation_count: 2
    raw_financial:
      max_avg_line_length: 50
      min_content_lines: 50

  skip_rules:
    - condition: "has_type('guidelines') and not has_any_type('application', 'report', 'activity_list', 'budget')"
      reason: "Funder guidelines, not organization content"

    - condition: "corruption_score > 0.5"
      reason: "Heavily corrupted ({corruption_score:.0%} single-char lines)"

    - condition: "content_lines < 15"
      reason: "Too small ({content_lines} content lines)"

    - condition: "has_type('email') and not has_any_type('notification', 'budget')"
      reason: "Email correspondence"

    - condition: "has_type('cv') and not has_type('application')"
      reason: "CV/resume"

    - condition: "path_contains('prep', 'todo', 'ToDo', 'PREP') and not has_type('meeting_notes') and content_lines < 50 and draft_marker_count > 2"
      reason: "Staff prep notes / todo"

    - condition: "not has_headings and has_tables and avg_content_line_length < 50 and content_lines > 50"
      reason: "Raw financial data export (no headings, dense pipe tables)"

    - condition: "filename.startswith('~$')"
      reason: "Office temp file (~$)"

  tier_rules:
    - condition: "form_chrome_count > 5 or draft_marker_count > 5 or duplicate_heading_count > 5 or word_count_annotation_count > 5"
      tier: "full"

    - condition: "has_any_type('application', 'report') and (form_chrome_count > 2 or draft_marker_count > 2)"
      tier: "full"

    - condition: "form_chrome_count > 2 or draft_marker_count > 2 or duplicate_heading_count > 2 or word_count_annotation_count > 2"
      tier: "light"

    - condition: "true"
      tier: "minimal"

# ── Rewriter config (from prototype rewrite_config.yaml) ──────────────────
rewrite:
  processing:
    max_workers: 10
    requests_per_second: 5
    max_retries: 3
    resume: true
    skip_existing: true
    output_dir: "folio_rewrite_md"
    max_input_tokens: 500000
    max_output_tokens: 384000

  undersized_thresholds:
    min_content_chars: 2000

  tiers:
    full:
      enabled: true
      model: "deepseek-v4-flash"
      thinking: enabled
      reasoning_effort: "high"
      est_seconds_per_file: 55

    light:
      enabled: true
      model: "deepseek-v4-flash"
      thinking: enabled
      reasoning_effort: "low"
      est_seconds_per_file: 50

    minimal:
      enabled: true
      model: "deepseek-v4-flash"
      thinking: disabled
      est_seconds_per_file: 20

# ── Prioritizer config (from prototype prioritize_config.yaml) ────────────
prioritize:
  processing:
    max_workers: 5
    requests_per_second: 3
    max_retries: 3
    retry_base_delay_seconds: 3
    retry_backoff_multiplier: 2.0
    source_dir: "folio_rewrite_md"
    output_dir: "folio_rewrite_md"
    digest_max_chars: 6000
    max_files_per_batch: 60
    response_max_tokens: 32000

  grouping:
    field: "written"
    by_funder: false

  rubric:
    1:
      label: "Essential"
      description: >
        Contains the primary, most complete version of information. Final submitted
        applications, approved budgets, complete activity reports, signed agreements.
        This is the go-to source for grant writing, org history research, and factual
        reference. No other file in the group duplicates this information more completely.
    2:
      label: "Supplemental"
      description: >
        Contains useful reference data that augments priority-1 files but is not
        essential on its own. Supporting materials, staff/board lists, policies,
        notification letters with grant amounts, budget breakdowns, activity lists
        that supplement applications. Information here may not be found elsewhere
        or provides useful detail.
    3:
      label: "Redundant/Low-value"
      description: >
        Information substantially duplicated in higher-priority files. Drafts where
        the final version also exists in the batch, internal prep notes, generic
        boilerplate forms, corrupted files with little recoverable content, duplicate
        copies, or files containing primarily navigation/form instructions rather
        than substantive content.

